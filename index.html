 IT",description:"Maîtrisez les techniques avancées de recherche d'emploi dans le secteur IT.",icon:"🔍",color:"from-blue-500 to-cyan-500",badge:"🏅 Expert Recherche",lessons:[{id:"js-1",title:"Introduction à la Recherche d'Emploi IT",duration:"15 min",type:"text",content:`# Introduction à la Recherche d'Emploi IT

## Le marché IT en 2024-2025

Le secteur IT est l'un des plus dynamiques au monde. Voici les tendances clés :

### 📊 Statistiques du marché
- **+15%** de croissance annuelle des offres IT
- **85%** des recruteurs utilisent LinkedIn
- **75%** des CV sont filtrés par des ATS avant d'être lus
- **Salaire moyen** développeur junior : 32-42K€

### 🎯 Les métiers les plus demandés
1. **Développeur Full Stack** — React, Node.js, Python
2. **DevOps Engineer** — Docker, Kubernetes, CI/CD
3. **Data Analyst/Scientist** — Python, SQL, Machine Learning
4. **Cybersécurité** — Pentesting, SOC Analyst
5. **Cloud Engineer** — AWS, Azure, GCP
6. **Administrateur Réseaux** — Cisco, Linux, Windows Server

### 🔑 Compétences transversales essentielles
- Communication technique
- Travail en équipe (Agile/Scrum)
- Résolution de problèmes
- Apprentissage continu
- Anglais technique

> 💡 **Conseil** : Ne vous limitez pas aux compétences techniques. Les soft skills représentent 40% de la décision de recrutement.

## Votre Plan d'Action

1. **Semaine 1-2** : Préparer votre CV et profils en ligne
2. **Semaine 3-4** : Créer votre portfolio et projets
3. **Semaine 5-6** : Postuler activement (5-10 candidatures/jour)
4. **Semaine 7-8** : Préparer les entretiens techniques`},{id:"js-2",title:"Plateformes de Recrutement IT",duration:"20 min",type:"text",content:`# Les Plateformes de Recrutement IT

## 🌐 Plateformes Généralistes

### LinkedIn — La plateforme N°1

## 📸 Photo et Bannière

### Exemple :

>

## 🛠️ Section Compétences

## 💼 Expérience & Projets

## 📊 Activité & Engagement
- Publiez 2-3 fois par semaine
- Commentez des posts techniques
- Partagez vos apprentissages
- Écrivez des articles techniques`},{id:"js-4",title:"Préparer un Entretien Technique",duration:"30 min",type:"text",content:`# Préparer un Entretien Technique IT

## 🎯 Types d'entretiens

### 1. Entretien téléphonique (Screening)
- Durée : 15-30 min
- Objectif : Vérifier la motivation et les bases
- **Préparez** : Votre pitch de 2 minutes

### 2. Test technique en ligne
- Plateformes : HackerRank, Codility, LeetCode
- Durée : 1-2h
- **Préparez** : Algorithmes, structures de données

### 3. Entretien technique approfondi
- Durée : 1-2h
- Live coding ou whiteboard
- **Préparez** : Résolution de problèmes à voix haute

### 4. Entretien système (System Design)
- Durée : 45-60 min
- Conception d'architecture
- **Préparez** : Scalabilité, bases de données, API

## 📋 Questions fréquentes

### Questions techniques
- "Expliquez la différence entre REST et GraphQL"
- "Comment fonctionne le Virtual DOM en React ?"
- "Qu'est-ce que Docker et pourquoi l'utiliser ?"
- "Expliquez le modèle OSI"
- "Comment sécuriser une API ?"

### Questions comportementales (STAR Method)
- **S**ituation : Décrivez le contexte
- **T**ask : Quelle était votre mission ?
- **A**ction : Qu'avez-vous fait ?
- **R**ésultat : Quel a été le résultat ?

## 🎮 Exercice pratique
Préparez votre réponse STAR pour :
1. Un projet difficile que vous avez mené
2. Un conflit en équipe que vous avez résolu
3. Un bug critique que vous avez corrigé

## ⚠️ Erreurs à éviter
- Ne pas avoir recherché l'entreprise
- Ne pas poser de questions
- Mentir sur ses compétences
- Ne pas tester sa webcam/micro avant
- Arriver en retard (même en visio)`},{id:"js-5",title:"Quiz — Recherche d'Emploi",duration:"10 min",type:"quiz",content:"Testez vos connaissances sur la recherche d'emploi IT."}],quiz:[{id:"q1",question:"Quel pourcentage des CV est filtré par un ATS avant d'être lu par un humain ?",options:["25%","50%","75%","90%"],correct:2,explanation:"Environ 75% des CV sont filtrés automatiquement par les systèmes ATS (Applicant Tracking System) avant d'atteindre un recruteur humain."},{id:"q2",question:"Quelle est la plateforme N°1 pour le recrutement IT ?",options:["Indeed","LinkedIn","Monster","Glassdoor"],correct:1,explanation:"LinkedIn est la plateforme la plus utilisée par les recruteurs IT, avec 85% des recruteurs qui l'utilisent activement."},{id:"q3",question:"Quelle méthode est recommandée pour répondre aux questions comportementales ?",options:["Méthode AIDA","Méthode STAR","Méthode SMART","Méthode Agile"],correct:1,explanation:"La méthode STAR (Situation, Task, Action, Result) est la méthode standard pour structurer ses réponses aux questions comportementales en entretien."},{id:"q4",question:"Combien de candidatures par jour sont recommandées dans une recherche active ?",options:["1-2","5-10","20-30","50+"],correct:1,explanation:"Il est recommandé d'envoyer 5-10 candidatures ciblées par jour plutôt que de postuler en masse sans personnalisation."},{id:"q5",question:"Quel élément LinkedIn est le plus important pour être trouvé par les recruteurs ?",options:["La photo","Le titre (headline)","Le nombre de connexions","Les publications"],correct:1,explanation:"Le titre (headline) est le premier élément que voient les recruteurs et le plus important pour le référencement LinkedIn."}]},{id:"cv-ats",title:"CV Professionnel ATS",description:"Créez un CV optimisé pour les systèmes ATS et les recruteurs IT.",icon:"📄",color:"from-emerald-500 to-teal-500",badge:"🏅 Expert CV ATS",lessons:[{id:"cv-1",title:"Comprendre les Systèmes ATS",duration:"15 min",type:"text",content:`# Comprendre les Systèmes ATS

## 🤖 Qu'est-ce qu'un ATS ?

Un **ATS** (Applicant Tracking System) est un logiciel utilisé par les entreprises pour :
- Recevoir et stocker les candidatures
- Filtrer automatiquement les CV
- Classer les candidats par pertinence
- Gérer le processus de recrutement

### ATS populaires
- **Workday** — Grandes entreprises
- **Greenhouse** — Startups & Tech
- **Lever** — Scale-ups
- **Taleo** (Oracle) — Multinationales
- **SAP SuccessFactors** — Grandes entreprises
- **SmartRecruiters** — PME/Grandes entreprises

## ⚙️ Comment fonctionne un ATS ?

### 1. Parsing du CV
L'ATS extrait :
- Nom, prénom, contact
- Expériences professionnelles
- Formation
- Compétences techniques
- Mots-clés

### 2. Scoring
L'ATS attribue un **score de pertinence** basé sur :
- Correspondance des mots-clés (40%)
- Expérience requise (25%)
- Formation (15%)
- Compétences techniques (20%)

### 3. Classement
Les CV sont classés du score le plus haut au plus bas. Seuls les **top 10-20%** sont vus par le recruteur.

## ❌ Ce qui bloque un ATS

| Élément | Problème |
|---------|----------|
| Images/logos | Non lisibles |
| Tableaux complexes | Structure cassée |
| En-têtes/pieds de page | Ignorés |
| Polices fantaisie | Non reconnues |
| Fichiers .png/.jpg | Non parsable |
| Colonnes multiples | Ordre mélangé |

## ✅ Format ATS-friendly
- Format **.docx** ou **.pdf** (texte sélectionnable)
- Structure simple, linéaire
- Titres de sections standards
- Mots-clés du poste visé
- Police standard (Arial, Calibri, Helvetica)
- Pas de graphiques pour les compétences`},{id:"cv-2",title:"Structure d'un CV IT Parfait",duration:"20 min",type:"text",content:`# Structure d'un CV IT Parfait

## 📐 Architecture du CV

### 1. En-tête (Header)
\`\`\`
PRÉNOM NOM
Développeur Full Stack | React & Node.js
📧 email@example.com | 📱 06 XX XX XX XX
📍 Paris, France | 🔗 linkedin.com/in/prenom-nom
💻 github.com/username | 🌐 portfolio.dev
\`\`\`

### 2. Résumé Professionnel (3-4 lignes)
> Développeur Full Stack avec 2 ans d'expérience en React et Node.js. Passionné par la création d'applications web performantes et scalables. Certifié AWS Cloud Practitioner. Disponible immédiatement.

### 3. Compétences Techniques
\`\`\`
Frontend : React, TypeScript, Vue.js, HTML5, CSS3, Tailwind
Backend : Node.js, Express, Python, Django, REST API
Base de données : PostgreSQL, MongoDB, Redis
DevOps : Docker, Kubernetes, CI/CD, GitHub Actions
Cloud : AWS (EC2, S3, Lambda), GCP
Outils : Git, Jira, Figma, Postman
\`\`\`

### 4. Expérience Professionnelle
Pour chaque expérience :
- **Titre du poste** — Nom de l'entreprise
- *Dates (MM/AAAA - MM/AAAA)*
- 3-5 bullet points avec **résultats chiffrés**

**Exemple :**
> **Développeur Full Stack** — TechCorp SAS
> *09/2023 - Présent*
> - Développé une application React/Node.js utilisée par +5000 utilisateurs
> - Réduit le temps de chargement de 40% via l'optimisation du code
> - Mis en place un pipeline CI/CD avec GitHub Actions (déploiement en 5 min)
> - Collaboré avec une équipe de 8 développeurs en méthodologie Agile/Scrum

### 5. Formation
- **Diplôme** — Établissement — Année
- Certifications pertinentes

### 6. Projets Personnels
- Nom du projet + lien GitHub
- Technologies utilisées
- Résultats/impact

### 7. Langues
- Français : Natif
- Anglais : B2/C1 (professionnel)

## 📏 Règles d'or
1. **1 page** pour < 5 ans d'expérience
2. **2 pages max** pour 5+ ans
3. Personnaliser pour chaque offre
4. Utiliser les mots-clés de l'offre
5. Résultats chiffrés (%, €, utilisateurs)`},{id:"cv-3",title:"Mots-clés et Optimisation ATS",duration:"20 min",type:"text",content:`# Mots-clés et Optimisation ATS

## 🔑 L'importance des mots-clés

Les ATS fonctionnent par **correspondance de mots-clés**. Si votre CV ne contient pas les bons termes, il sera filtré.

## 📋 Comment identifier les mots-clés

### Étape 1 : Analyser l'offre d'emploi
Repérez dans l'offre :
- Technologies mentionnées
- Compétences requises
- Termes récurrents
- Niveau d'expérience

### Étape 2 : Catégoriser les mots-clés

| Catégorie | Exemples |
|-----------|----------|
| **Hard skills** | React, Python, SQL, Docker |
| **Soft skills** | Leadership, Communication, Agile |
| **Certifications** | AWS, CCNA, PMP, Scrum Master |
| **Outils** | Jira, Git, Figma, Jenkins |
| **Méthodologies** | Agile, Scrum, DevOps, CI/CD |

### Étape 3 : Intégrer naturellement
- Dans le résumé professionnel
- Dans les descriptions d'expérience
- Dans la section compétences
- Dans les projets

## 🎯 Mots-clés par métier IT

### Développeur Web
\`React, Vue.js, Angular, TypeScript, JavaScript, HTML5, CSS3, Node.js, REST API, GraphQL, Git, Webpack, Jest, Tailwind CSS\`

### Administrateur Réseaux
\`Cisco, TCP/IP, DNS, DHCP, VPN, Firewall, VLAN, Active Directory, Windows Server, Linux, Monitoring, Nagios, Zabbix\`

### Cybersécurité
\`Pentesting, SIEM, SOC, Firewall, IDS/IPS, Nmap, Wireshark, Metasploit, ISO 27001, RGPD, Analyse de risques\`

### DevOps
\`Docker, Kubernetes, Jenkins, Terraform, Ansible, CI/CD, AWS, Azure, GitLab CI, Monitoring, Prometheus, Grafana\`

## ⚡ Astuces Pro
1. **Utilisez les deux formats** : "JavaScript" ET "JS"
2. **Évitez les abréviations seules** : écrivez "Search Engine Optimization (SEO)"
3. **Répétez 2-3 fois** les mots-clés importants naturellement
4. **Utilisez les exact terms** de l'offre d'emploi`},{id:"cv-4",title:"Exercice — Créez votre CV",duration:"45 min",type:"exercise",content:`# Exercice Pratique — Créez votre CV ATS

## 📐 Les 4 Paragraphes Essentiels

### Paragraphe 1 — L'Accroche (3-4 lignes)
**Objectif** : Capter l'attention immédiatement

**Mauvais** : "Suite à votre annonce parue sur..."
**Bon** : "Développeur React avec 2 ans d'expérience en création d'applications SaaS, je suis enthousiaste à l'idée de rejoindre [Entreprise] pour contribuer à votre plateforme utilisée par 100K+ utilisateurs."

### Paragraphe 2 — Vos Compétences (5-6 lignes)
**Objectif** : Montrer que vous avez les compétences requises

Structure :
- Référencez 2-3 compétences clés de l'offre
- Donnez des exemples concrets
- Chiffrez vos résultats

### Paragraphe 3 — Pourquoi cette entreprise (4-5 lignes)
**Objectif** : Montrer que vous connaissez l'entreprise

- Mentionnez un projet/produit spécifique
- Expliquez pourquoi leur mission vous motive
- Montrez l'alignement avec vos valeurs

### Paragraphe 4 — Conclusion et Call to Action (2-3 lignes)
**Objectif** : Proposer un entretien

"Je serais ravi d'échanger avec vous lors d'un entretien pour discuter de ma contribution potentielle à votre équipe. Je reste disponible à votre convenance."

## 📏 Règles d'or
1. **Maximum 1 page** (250-350 mots)
2. **Personnaliser** pour chaque entreprise
3. **Pas de fautes** d'orthographe
4. **Ton professionnel** mais enthousiaste
5. **Reprendre les mots-clés** de l'offre`},{id:"cl-2",title:"Exemples de Lettres par Métier",duration:"20 min",type:"text",content:`# Exemples de Lettres de Motivation IT

## 💻 Développeur Full Stack

---

Madame, Monsieur,

Passionné par le développement web depuis 3 ans, je me permets de vous adresser ma candidature pour le poste de Développeur Full Stack au sein de [Entreprise]. Votre engagement pour l'innovation technologique et votre stack technique moderne (React, Node.js, PostgreSQL) correspondent parfaitement à mon parcours et mes ambitions.

Au cours de mes expériences, j'ai développé une application e-commerce en React/Node.js générant +500 transactions quotidiennes, mis en place une architecture microservices réduisant le temps de réponse API de 60%, et contribué à un projet open source comptant +2000 stars sur GitHub. Ma maîtrise de TypeScript, Docker et les pipelines CI/CD me permettrait d'être rapidement opérationnel au sein de votre équipe.

[Entreprise] m'attire particulièrement par votre produit [X] qui révolutionne [domaine]. Votre culture d'entreprise axée sur l'apprentissage continu et la qualité du code résonne avec mes valeurs professionnelles.

Je serais ravi d'échanger avec vous lors d'un entretien pour discuter de ma contribution à vos projets. Je reste disponible à votre convenance.

Cordialement,
[Prénom Nom]

---

## 🔒 Administrateur Réseaux & Sécurité

---

Madame, Monsieur,

Titulaire d'un BTS Réseaux & Télécommunications et certifié CCNA, je souhaite rejoindre [Entreprise] en tant qu'Administrateur Réseaux pour mettre à profit mon expertise en infrastructure et sécurité réseau.

Fort d'une expérience de 2 ans en administration d'infrastructures réseau (Cisco, Linux, Windows Server), j'ai géré un parc de 500 postes, implémenté une solution VPN sécurisant les connexions de 200 collaborateurs distants, et réduit les incidents réseau de 35% grâce à la mise en place d'un monitoring Nagios/Zabbix proactif.

Votre entreprise, reconnue pour son expertise en solutions cloud et son infrastructure haute disponibilité, représente pour moi l'environnement idéal pour développer mes compétences et apporter une valeur ajoutée immédiate.

Disponible immédiatement, je serais honoré de vous rencontrer pour discuter de ma candidature.

Cordialement,
[Prénom Nom]`},{id:"cl-3",title:"Exercice — Rédigez votre lettre",duration:"30 min",type:"exercise",content:`# Exercice — Rédigez votre Lettre de Motivation

## 🎯 L'impact d'un portfolio

### Statistiques
- **68%** des recruteurs IT consultent le portfolio avant l'entretien
- Un portfolio augmente vos chances de **+40%**
- Les candidats avec portfolio reçoivent **2x plus** de réponses

## 💼 Ce qu'un portfolio démontre

1. **Compétences techniques réelles** — Pas juste des mots sur un CV
2. **Capacité à livrer** — Des projets terminés et fonctionnels
3. **Qualité du code** — Bonnes pratiques, architecture
4. **Créativité** — Design, UX, résolution de problèmes
5. **Passion** — Projets personnels, contributions open source

## 🏗️ Structure d'un Portfolio Professionnel

### Pages essentielles
1. **Accueil (Hero)** — Première impression, nom, titre, CTA
2. **À propos** — Bio, parcours, compétences
3. **Projets** — 4-6 projets détaillés
4. **Compétences** — Technologies maîtrisées
5. **Contact** — Formulaire, email, liens sociaux

### Pour chaque projet
- Screenshot/démo
- Description du problème résolu
- Technologies utilisées
- Votre rôle et contributions
- Lien vers le code (GitHub)
- Lien vers la démo live
- Résultats/impact

## 🎨 Design Tips
- Design épuré et moderne
- Maximum 3 couleurs
- Typographie lisible
- Animations subtiles
- Mobile-first
- Temps de chargement < 3 secondes
- Accessibilité (WCAG 2.1)`},{id:"pf-2",title:"Créer un Portfolio avec HTML/CSS/JS",duration:"45 min",type:"text",content:`# Créer un Portfolio — Guide Complet

## 🎨 CSS Moderne

\`\`\`css
:root {
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --bg: #0f172a;
  --text: #e2e8f0;
  --card-bg: #1e293b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bg), #1a1a2e);
  padding: 2rem;
}

.name {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 0.5rem 0;
}

.btn {
  padding: 0.75rem 2rem;
  border-radius: 0.5rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s ease;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
}
\`\`\`

## 📱 Responsive Design

\`\`\`css
@media (max-width: 768px) {
  .name { font-size: 2rem; }
  .hero-buttons { flex-direction: column; }
  .projects-grid { grid-template-columns: 1fr; }
}

## 🎯 Fixed vs Growth Mindset

La psychologue Carol Dweck a identifié deux états d'esprit fondamentaux :

### Fixed Mindset (État d'esprit fixe)
- "Je suis nul en maths"
- "Je ne suis pas fait pour coder"
- "Les autres sont plus intelligents"
- **Évite les défis** par peur de l'échec
- **Abandonne facilement** face aux obstacles

### Growth Mindset (État d'esprit de croissance)
- "Je peux apprendre les maths"
- "Le code s'apprend avec de la pratique"
- "Je peux développer mes compétences"
- **Embrasse les défis** comme opportunités
- **Persévère** malgré les obstacles

## 🔑 Comment développer le Growth Mindset

### 1. Changez votre langage interne
| ❌ Fixed Mindset | ✅ Growth Mindset |
|-----------------|-------------------|
| "Je ne sais pas coder" | "Je ne sais pas **encore** coder" |
| "C'est trop dur" | "Ça demande plus de pratique" |
| "J'ai échoué" | "J'ai appris ce qui ne fonctionne pas" |

### 2. Embrassez les erreurs
> "J'ai échoué 1000 fois avant de réussir l'ampoule. Je n'ai pas échoué. J'ai découvert 1000 façons qui ne fonctionnent pas." — Thomas Edison

En programmation, les bugs sont vos meilleurs professeurs.

### 3. Célébrez le processus, pas le résultat
- Félicitez-vous pour l'effort, pas le talent
- Valorisez l'apprentissage, pas la performance
- Appréciez la progression, pas la perfection

### 4. Apprenez des critiques
- Le feedback négatif = opportunité d'amélioration
- Les code reviews = apprentissage gratuit
- Les rejets en entretien = données pour s'améliorer

## 💪 Exercice Pratique
Cette semaine, remplacez chaque "Je ne peux pas" par "Je ne peux pas **encore**".`},{id:"ms-2",title:"Discipline & Habitudes",duration:"20 min",type:"text",content:`# Discipline & Habitudes — Le Système qui Remplace la Motivation

## 🎯 Pourquoi la Motivation ne Suffit Pas

La motivation est **temporaire**. Elle fluctue selon :
- Votre humeur
- Votre niveau d'énergie
- Les circonstances externes

La **discipline** et les **habitudes** sont permanentes.

> "Nous sommes ce que nous faisons de manière répétée. L'excellence n'est donc pas un acte, mais une habitude." — Aristote

## 🔄 La Science des Habitudes

### Le Loop de l'Habitude (Charles Duhigg)
1. **Signal** → Ce qui déclenche l'action
2. **Routine** → L'action elle-même
3. **Récompense** → Ce qui renforce l'habitude

### Exemple : Coder tous les jours
- **Signal** : Après le café du matin
- **Routine** : Coder pendant 30 minutes
- **Récompense** : Sentiment d'accomplissement + tracker

## 📅 Construire des Habitudes de Développeur

### Les Habitudes Quotidiennes Essentielles

| Habitude | Durée | Impact |
|----------|-------|--------|
| Coder | 30 min - 2h | Compétence technique |
| Lire (tech) | 15-30 min | Veille technologique |
| LeetCode/Algo | 15-30 min | Préparation entretiens |
| Push GitHub | 5 min | Consistance visible |
| Journal/Review | 10 min | Réflexion & progression |

### La Règle des 2 Minutes (James Clear)
> "Si ça prend moins de 2 minutes, faites-le maintenant."

Pour démarrer une nouvelle habitude, réduisez-la à 2 minutes :
- "Coder 1 heure" → "Ouvrir VS Code"
- "Faire du sport" → "Mettre ses chaussures"
- "Lire un livre" → "Lire une page"

## 🎯 Le Système de Tracking

### Méthode "Don't Break the Chain" (Seinfeld)
- Marquez chaque jour où vous pratiquez
- Ne brisez jamais la chaîne
- La streak devient motivante

### Template de Journal Quotidien
\`\`\`
📅 Date: __/__/____
✅ Habitudes réalisées:
- [ ] Coder 30 min
- [ ] LeetCode 1 problème
- [ ] Lire 15 min
- [ ] Push GitHub

🎯 Top 3 du jour:
1. ________________
2. ________________
3. ________________

📝 Apprentissages:
________________

🔄 Amélioration demain:
________________
\`\`\``},{id:"ms-3",title:"Gestion du Temps & Productivité",duration:"20 min",type:"text",content:`# Gestion du Temps & Productivité

## ⏰ Les Principes Fondamentaux

### Loi de Pareto (80/20)
> 20% de vos efforts produisent 80% des résultats.

**Application IT** :
- 20% des fonctionnalités satisfont 80% des utilisateurs
- 20% de vos connaissances résolvent 80% des problèmes
- 20% de votre temps produit 80% de votre valeur

### Loi de Parkinson
> "Le travail s'étend pour remplir le temps disponible."

**Solution** : Fixez des deadlines serrées mais réalistes.

### Loi de Carlson
> "Un travail interrompu prend plus de temps qu'un travail continu."

**Solution** : Bloquez des périodes de travail profond.

## 🍅 La Méthode Pomodoro

1. Choisissez une tâche
2. Réglez un timer sur **25 minutes**
3. Travaillez sans interruption
4. Prenez une pause de **5 minutes**
5. Tous les 4 pomodoros, pause de **15-30 minutes**

### Outils Pomodoro
- Forest (app mobile)
- Tomato Timer (web)
- Focus Keeper
- Pomofocus.io

## 📋 Time Blocking

Planifiez votre journée par blocs :

\`\`\`
06:00 - 07:00 | 🏃 Sport / Routine matinale
07:00 - 08:00 | 📚 Apprentissage (cours, lecture)
08:00 - 12:00 | 💻 Deep Work (code, projets)
12:00 - 13:00 | 🍽️ Déjeuner & Repos
13:00 - 14:00 | 📧 Communication (emails, calls)
14:00 - 18:00 | 💻 Deep Work (code, projets)
18:00 - 19:00 | 🔍 Review & Planification demain
19:00 - 22:00 | 👨‍👩‍👧‍👦 Vie personnelle
\`\`\`

## 🎯 Matrice d'Eisenhower

| | Urgent | Non Urgent |
|---|--------|------------|
| **Important** | ✅ FAIRE maintenant | 📅 PLANIFIER |
| **Non Important** | 🔄 DÉLÉGUER | ❌ ÉLIMINER |

### Application pour Développeurs
- **Urgent + Important** : Bug en production
- **Non Urgent + Important** : Apprendre une nouvelle techno
- **Urgent + Non Important** : La plupart des emails
- **Non Urgent + Non Important** : Scroll réseaux sociaux

## 🚫 Éliminer les Distractions

### Distractions Communes
- Notifications téléphone
- Réseaux sociaux
- Emails constants
- Open space bruyant
- Multitasking

### Solutions
- Mode avion pendant le deep work
- Bloquer les sites (Freedom, Cold Turkey)
- Casque antibruit
- Communication asynchrone
- Single-tasking`},{id:"ms-4",title:"Communication & Leadership",duration:"20 min",type:"text",content:`# Communication & Leadership en IT

## 💬 Communication Technique

### Les 4 Règles d'Or

**1. Simplicité**
- Expliquez comme à un enfant de 10 ans
- Évitez le jargon technique inutile
- Utilisez des analogies

**2. Structure**
- Introduction → Contexte → Détails → Conclusion
- Utilisez des bullet points
- Une idée par paragraphe

**3. Écoute Active**
- Posez des questions de clarification
- Reformulez pour confirmer
- Ne coupez pas la parole

**4. Feedback Constructif**
- Commencez par le positif
- Soyez spécifique sur les améliorations
- Proposez des solutions

## 📝 Communication Écrite

### Emails Professionnels
\`\`\`
Sujet: [ACTION REQUISE] Review PR #123 - Feature X

Bonjour [Nom],

Je sollicite votre review sur la PR #123 qui implémente [Feature X].

Points clés:
• Ajout de [fonctionnalité A]
• Refactoring de [composant B]
• Tests unitaires inclus

Merci de votre retour d'ici [date].

Cordialement,
[Prénom]
\`\`\`

### Messages Slack/Teams
- Court et direct
- Une demande par message
- Utilisez les threads
- @mention uniquement si nécessaire

## 🎤 Présentations Techniques

### Structure STAR pour expliquer un projet
- **S**ituation : Le contexte
- **T**ask : Votre mission
- **A**ction : Ce que vous avez fait
- **R**ésultat : L'impact mesurable

### Conseils Présentation
- 10 slides max
- 1 idée par slide
- Visuels > Texte
- Préparez des démos live
- Anticipez les questions

## 👥 Leadership Technique

### Les 5 Niveaux de Leadership (John Maxwell)

1. **Position** : Les gens suivent parce qu'ils doivent
2. **Permission** : Les gens suivent parce qu'ils le veulent
3. **Production** : Les gens suivent pour les résultats
4. **Développement** : Les gens suivent pour ce que vous leur apprenez
5. **Personnage** : Les gens suivent pour qui vous êtes

### Compétences Leadership IT
- Mentorat des juniors
- Code reviews constructives
- Documentation claire
- Prise de décision technique
- Gestion de conflits`},{id:"ms-5",title:"Challenge — Journal de Progression",duration:"7 jours",type:"challenge",content:`# Challenge 7 Jours — Journal de Progression

## 🚀 L'Esprit Entrepreneur en 2025

### Pourquoi Développer cet État d'Esprit ?

L'économie moderne récompense ceux qui :
- **Créent de la valeur** plutôt que de consommer
- **Résolvent des problèmes** pour les autres
- **Prennent des initiatives** sans attendre qu'on leur dise
- **Construisent des actifs** plutôt que d'échanger temps contre argent

> "L'entrepreneur voit une opportunité là où les autres voient un obstacle."

## 💡 Les Piliers de l'Esprit Entrepreneurial

### 1. Création de Valeur
- Identifiez les problèmes autour de vous
- Proposez des solutions
- Pensez "Comment puis-je aider ?"
- Créez avant de consommer

### 2. Prise de Risque Calculée
- Sortez de votre zone de confort
- Acceptez l'échec comme apprentissage
- Testez rapidement, itérez
- Minimisez les risques tout en agissant

### 3. Persévérance
- Le succès prend du temps
- Les obstacles font partie du chemin
- La consistance bat l'intensité
- Ne jamais abandonner trop tôt

### 4. Apprentissage Continu
- Restez curieux
- Apprenez de tous (juniors, seniors, autres industries)
- Investissez dans votre éducation
- Expérimentez constamment

## 🌐 Le Pouvoir du Réseau Relationnel

### Votre Réseau = Votre Richesse

Les personnes que vous connaissez peuvent :
- Ouvrir des portes
- Partager des opportunités
- Vous recommander
- Vous mentorer
- Devenir partenaires

### Comment Développer son Réseau

**Stratégie du "Give First"**
1. Aidez les autres sans rien attendre
2. Partagez vos connaissances gratuitement
3. Faites des introductions
4. Soyez la personne qui connecte

**La Règle des 5 Personnes**
> Vous êtes la moyenne des 5 personnes avec qui vous passez le plus de temps.

- Entourez-vous de personnes inspirantes
- Cherchez des mentors
- Participez à des masterminds

### Développer des Revenus Complémentaires

Pour les développeurs :

## 🌍 Le Numérique : Un Pollueur Invisible

### Statistiques Alarmantes
- Le numérique représente **4% des émissions mondiales de CO2**
- C'est **plus que l'aviation civile** (2.5%)
- La croissance est de **+9%/an**
- En 2025 : **8% des émissions mondiales** si rien ne change

### Sources d'Émissions Numériques

| Source | Part des émissions |
|--------|-------------------|
| Fabrication des appareils | **45%** |
| Data centers | **25%** |
| Réseaux (internet) | **20%** |
| Usage des appareils | **10%** |

## 💻 Les Data Centers

### Consommation Énergétique
- Un data center moyen = **25 000 foyers**
- Le streaming vidéo = **1% des émissions mondiales**
- Une recherche Google = **0.2g de CO2**
- Un email avec pièce jointe = **35g de CO2**

### Refroidissement
- **40%** de l'énergie d'un data center sert au refroidissement
- Température idéale : 18-27°C
- Solutions : free cooling, immersion cooling

## 📱 L'Obsolescence des Appareils

### Le Problème
- Un smartphone = **70kg de ressources naturelles**
- Durée de vie moyenne : **2-3 ans**
- Recyclage réel : **<20%**
- E-waste mondial : **50 millions de tonnes/an**

### Métaux Rares
Un smartphone contient :
- Or, argent, cuivre
- Lithium, cobalt
- Terres rares (néodyme, tantale)
- Conditions d'extraction souvent problématiques

## 🤖 L'IA : Le Nouveau Défi

### Consommation de l'IA
- Entraîner GPT-3 = **552 tonnes de CO2** (= 5 voitures pendant toute leur vie)
- Une requête ChatGPT = **10x une recherche Google**
- Les modèles doublent en taille tous les 3-4 mois

### L'Eau et l'IA
- Microsoft : **+34% de consommation d'eau** en 2022 (pour l'IA)
- Un data center = **millions de litres d'eau/jour**

## 📊 Empreinte Numérique Quotidienne

| Action | Émission CO2 |
|--------|-------------|
| 1h de streaming HD | 36g |
| 1 email (sans pièce jointe) | 4g |
| 1 email (avec pièce jointe 1MB) | 19g |
| 1h de visioconférence | 150-1000g |
| 1 recherche Google | 0.2g |
| 1 post Instagram | 0.15g |
| 1 minute TikTok | 2.63g |

> "Si Internet était un pays, ce serait le 3ème consommateur d'électricité mondial."`},{id:"gt-2",title:"Green IT : Principes et Pratiques",duration:"20 min",type:"text",content:`# Green IT : Principes et Pratiques

## 🌱 Qu'est-ce que le Green IT ?

### Définition
Le **Green IT** (ou IT durable) désigne l'ensemble des pratiques visant à réduire l'empreinte environnementale des technologies de l'information.

### Les 3 Niveaux du Green IT

**Green IT 1.0** : Optimisation infrastructure
- Efficacité énergétique des data centers
- Virtualisation des serveurs
- Gestion des déchets électroniques

**Green IT 1.5** : IT pour le développement durable
- Télétravail & visioconférence
- Dématérialisation
- Smart buildings

**Green IT 2.0** : IT au service de l'environnement
- Monitoring environnemental
- Smart grids
- Optimisation des transports

## ♻️ Les Pratiques Green IT

### Pour les Développeurs

**1. Éco-conception Web**
- Optimiser les images (WebP, compression)
- Minifier CSS/JS
- Lazy loading
- Limiter les requêtes HTTP
- Choisir des hébergeurs verts

**2. Code Efficient**
- Algorithmes optimisés
- Éviter les requêtes inutiles
- Cache intelligent
- Clean code (moins de ressources serveur)

**3. Architecture Sobre**
- Éviter le sur-engineering
- Microservices vs monolithe (selon contexte)
- Serverless quand approprié
- CDN géographiquement pertinent

### Pour les Entreprises

**1. Politique d'Achat Responsable**
- Labels éco (EPEAT, Energy Star, TCO)
- Durée de vie prolongée
- Appareils reconditionnés
- Location plutôt qu'achat

**2. Gestion du Cycle de Vie**
- Maintenance prolongée
- Réparation avant remplacement
- Recyclage certifié (R2, e-Stewards)
- Don ou revente

**3. Data Centers Verts**
- PUE (Power Usage Effectiveness) < 1.4
- Énergies renouvelables
- Refroidissement naturel
- Récupération de chaleur

## 📊 Métriques Green IT

### PUE (Power Usage Effectiveness)
\`\`\`
PUE = Énergie totale data center / Énergie IT
\`\`\`
- PUE idéal : 1.0 (impossible en pratique)
- PUE moyen : 1.6
- PUE excellent : < 1.3

### Carbon Intensity
- Mesure les émissions CO2 par unité de service
- Varie selon le mix énergétique local
- France : ~50g CO2/kWh (nucléaire)
- Allemagne : ~400g CO2/kWh (charbon)

## 🏢 Entreprises Exemplaires

### Engagements Majeurs
- **Google** : Carbon neutral depuis 2007, 100% renouvelable
- **Microsoft** : Carbon negative d'ici 2030
- **Apple** : 100% renouvelable, carbone neutre 2030
- **AWS** : 100% renouvelable d'ici 2025`},{id:"gt-3",title:"Bonnes Pratiques Numériques",duration:"15 min",type:"text",content:`# Bonnes Pratiques Numériques Responsables

## 🖥️ Gestion des Emails

### Le Problème
- **306 milliards** d'emails envoyés/jour
- **80%** ne sont jamais ouverts
- Les newsletters oubliées s'accumulent
- Les pièces jointes multiplient l'impact

### Solutions
✅ **Faire le tri**
- Désinscrivez-vous des newsletters inutiles
- Supprimez les vieux emails (surtout avec PJ)
- Videz la corbeille et spam régulièrement

✅ **Envoyer mieux**
- Évitez "Reply All" quand inutile
- Compressez les pièces jointes
- Utilisez des liens plutôt que des fichiers
- Évitez les signatures avec images

## 🔍 Navigation Web

### Bonnes Pratiques
- **Favoris** : Ajoutez les sites fréquents (évitez Google)
- **URL directes** : Tapez l'adresse plutôt que chercher
- **Onglets** : Fermez ceux inutilisés
- **Extensions** : Limitez au strict nécessaire
- **Mode sombre** : Économise l'écran et les yeux

### Streaming Responsable
- Téléchargez plutôt que streamez (répété)
- Réduisez la qualité vidéo (720p suffit souvent)
- Évitez l'autoplay
- Podcast audio > vidéo YouTube

## 📱 Appareils & Équipements

### Prolonger la Durée de Vie
- **Étui de protection** : Protège des chutes
- **Batterie** : Gardez entre 20-80%
- **Mises à jour** : Gardez l'OS à jour
- **Nettoyage** : Désinstallez les apps inutilisées
- **Réparation** : Privilégiez la réparation au remplacement

### Achat Responsable
- Reconditionnés (Back Market, Fnac 2nd vie)
- Labels éco (EPEAT, Blue Angel)
- Durabilité > Dernière technologie
- Indice de réparabilité

## 💾 Stockage & Cloud

### Bonnes Pratiques
- Supprimez les fichiers inutiles
- Évitez les doublons
- Compressez les archives
- Limitez la synchronisation automatique
- Préférez le local au cloud quand possible

## 📊 Checklist Éco-Responsable

### Quotidien
- [ ] Fermer les onglets non utilisés
- [ ] Éteindre l'ordinateur le soir
- [ ] Désactiver Bluetooth/WiFi si inutilisé
- [ ] Baisser la luminosité de l'écran

### Hebdomadaire
- [ ] Vider la corbeille email
- [ ] Supprimer les fichiers temporaires
- [ ] Désinstaller les apps inutilisées
- [ ] Trier les téléchargements

### Mensuel
- [ ] Audit des newsletters
- [ ] Nettoyage cloud/stockage
- [ ] Vérifier les sauvegardes
- [ ] Supprimer les vieux comptes`},{id:"gt-4",title:"Éco-Conception Web",duration:"20 min",type:"text",content:`# Éco-Conception Web pour Développeurs

## 🌐 Principes de l'Éco-Conception

### Les 3R du Développement Durable
1. **Réduire** : Moins de code, moins de ressources
2. **Réutiliser** : Components, libraries existantes
3. **Recycler** : Refactoring, optimisation

### Les 5 Piliers de l'Éco-Conception Web

**1. Simplicité Fonctionnelle**
- Chaque feature = impact environnemental
- YAGNI (You Ain't Gonna Need It)
- Moins de features = moins de code = moins d'énergie

**2. Sobriété Technique**
- Technologies appropriées au besoin
- Éviter le sur-engineering
- Privilégier les solutions natives

**3. Performance**
- Code optimisé = moins de ressources serveur
- Temps de chargement réduit = moins de data
- Efficacité algorithme = moins de CPU

**4. Durabilité**
- Code maintenable
- Documentation claire
- Rétrocompatibilité

**5. Accessibilité**
- Un site accessible = utilisable plus longtemps
- Moins de frustration = moins de rechargements
- Plus d'utilisateurs sans changer le code

## 💻 Techniques d'Optimisation

### Images
\`\`\`html
\x3C!-- ❌ Mauvais -->
<img src="photo.png" />

\x3C!-- ✅ Bon -->
<img 
  src="photo.webp" 
  srcset="photo-400.webp 400w, photo-800.webp 800w"
  sizes="(max-width: 600px) 400px, 800px"
  loading="lazy"
  alt="Description"
/>
\`\`\`

### CSS/JS
\`\`\`bash
# Minification
npx terser script.js -o script.min.js
npx cssnano styles.css styles.min.css

# Tree-shaking (Vite/Webpack)
# Importer uniquement ce qui est nécessaire
import { debounce } from 'lodash-es'  # ✅
import _ from 'lodash'  # ❌
\`\`\`

### Fonts
\`\`\`css
/* ❌ Charger toutes les variantes */
@import url('https://fonts.googleapis.com/css2?family=Inter');

/* ✅ Uniquement ce qui est nécessaire */
@font-face {
  font-family: 'Inter';
  src: url('/fonts/inter.woff2') format('woff2');
  font-display: swap;
}
\`\`\`

## 📊 Mesurer l'Impact

### Outils d'Audit
- **Lighthouse** : Performance, accessibilité
- **Website Carbon** : Empreinte carbone
- **EcoIndex** : Score environnemental
- **Green Web Foundation** : Hébergement vert

### Métriques Clés
| Métrique | Cible |
|----------|-------|
| Poids page | < 1 MB |
| Requêtes HTTP | < 25 |
| Temps chargement | < 3s |
| LCP | < 2.5s |
| EcoIndex | A ou B |

## 🏆 Best Practices

### Architecture
- SSG (Static Site Generation) quand possible
- CDN pour la distribution
- Compression (gzip, brotli)
- HTTP/2 ou HTTP/3

### Code
- Pas de dépendances inutiles
- Code splitting
- Lazy loading
- Service Workers pour cache`},{id:"gt-5",title:"Projet Noté — Recherche Environnementale",duration:"2 semaines",type:"project",content:`# Mini Projet Noté — Recherche Environnementale

## 🎯 Objectif
Réaliser une recherche approfondie sur un sujet lié à l'impact environnemental du numérique et présenter vos découvertes.

## 📋 Sujets Disponibles

### Catégorie 1 : Infrastructure
1. **Impact écologique des data centers** — Consommation énergétique, refroidissement, solutions
2. **Cloud computing et environnement** — Avantages vs inconvénients écologiques
3. **5G et empreinte carbone** — Déploiement, consommation, impact

### Catégorie 2 : Pratiques
4. **Green coding** — Techniques de développement éco-responsable
5. **Pollution numérique au quotidien** — Emails, streaming, réseaux sociaux
6. **Obsolescence programmée** — Causes, conséquences, alternatives

### Catégorie 3 : Technologies
7. **IA et consommation énergétique** — Training, inference, solutions
8. **Blockchain et énergie** — Proof of Work vs Proof of Stake
9. **Cryptomonnaies et environnement** — Bitcoin, Ethereum, alternatives vertes

### Catégorie 4 : Solutions
10. **E-waste et recyclage** — Situation mondiale, solutions, acteurs
11. **Green IT en entreprise** — Politiques, certifications, ROI
12. **Éco-conception web** — Principes, techniques, exemples

## 📝 Livrables

### 1. Document de Recherche (PDF)
- **Format** : 5-10 pages
- **Structure** :
  - Introduction et problématique
  - État des lieux (données chiffrées)
  - Analyse et enjeux
  - Solutions et bonnes pratiques
  - Conclusion et engagement personnel
  - Sources (minimum 5 sources fiables)

### 2. Présentation (Slides)
- **Format** : 10-15 slides
- **Durée** : 10 minutes de présentation
- **Contenu** : Synthèse visuelle du document

## 📤 Soumission

Envoyez via le formulaire de la plateforme :
- Votre document PDF

## 📊 Critères d'Évaluation
